name: Order Service CodeQL

on:
  push:
    branches: [ "master", "development" ]
  pull_request:
    branches: [ "master", "development" ]
  schedule:
    - cron: '0 1 * * 1'

jobs:
  call-codeql:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ecomera-ecosystem/.github/.github/workflows/codeql.yml@main
    with:
      language: 'java'
